<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 🌊 Footer */
.footer {
  background: #0b3d5c;
  color: white;
  padding-top: 50px;
}

/* 👤 Profile */
.footer-profile {
  text-align: center;
  margin-bottom: 30px;
}

.footer-profile img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.footer-profile h3 {
  margin-top: 10px;
  font-size: 18px;
}

/* 📦 Container */
.footer-container {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  padding: 0 40px;
}

/* 📄 Columns */
.footer-col {
  width: 230px;
  margin: 15px;
}

.footer-col h3 {
  margin-bottom: 15px;
}

.footer-col p {
  font-size: 14px;
  color: #ddd;
  line-height: 1.6;
}

/* 🌐 Social Icons */
.social-icons {
  margin-top: 10px;
}

.social-icons a {
  display: inline-block;
  margin-right: 10px;
  font-size: 18px;
  color: white;
  background: #145374;
  padding: 10px;
  border-radius: 50%;
  transition: 0.3s;
}

.social-icons a:hover {
  transform: scale(1.1);
  background: #1da1f2;
}

/* 🔻 Bottom */
.footer-bottom {
  text-align: center;
  padding: 15px;
  margin-top: 30px;
  background: #082c44;
  font-size: 14px;
  color: #ccc;
}

/* 📱 Responsive */
@media(max-width:768px){
  .footer-container {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
}
</style>
</head>

<body>

<footer class="footer">

  <!-- 👤 Profile Center -->
  <div class="footer-profile">
    <img src="Images/profile.png" alt="Owner">
    <h3>Keerthi</h3>
  </div>

  <!-- 📦 Content -->
  <div class="footer-container">

    <div class="footer-col">
      <h3>CleanCo</h3>
      <p>
        We provide high-quality cleaning tools and essentials to keep your home fresh, safe, and hygienic.
      </p>
    </div>

    <div class="footer-col">
      <h3>About</h3>
      <p>
        Our mission is to deliver eco-friendly and powerful cleaning solutions for every household.
      </p>
    </div>

    <div class="footer-col">
      <h3>Contact</h3>
      <p>📞 9247840456</p>
      <p>📧 clean@example.com</p>
      <p>📍 India</p>
    </div>

    <div class="footer-col">
      <h3>Follow Us</h3>
      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/919297253176"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>
    </div>

  </div>

</footer>

</body>
</html>
